<!--*********************************************************************************************************************************
**** Objetivo: Desenvolver uma aplicação front-end que consome a PokeAPI para exibir Pokémons em formato de cards interativos.   ****
**** Funcionalidades: Busca por nome, tipo e número da Pokédex (#ID), sistema de favoritos e layout responsivo.                  ****
**** Tecnologias: HTML, CSS e JavaScript (Fetch API, LocalStorage e manipulação de DOM).                                         ****
**** API utilizada: https://pokeapi.co/                                                                                          ****
**** Autor: Aleff Blendon Costa                                                                                                  ****
**** Data: 03/05/2026                                                                                                            ****
**** Versão: 1.0                                                                                                                 ****
**********************************************************************************************************************************-->

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__inner">
        <h1 id="logoBtn" class="header__title" role="button" tabindex="0"
            title="Voltar à tela inicial" style="cursor:pointer">
          <span class="header__poke">Poké</span>dex
        </h1>
        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            class="search-bar__input"
            placeholder="Nome, tipo ou número (ex: pikachu, fire, #025)…"
            autocomplete="off"
          />
          <button id="searchBtn" class="search-bar__btn" aria-label="Buscar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
        <button id="favBtn" class="fav-toggle" aria-pressed="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="currentColor" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          Favoritos
        </button>
      </div>
    </header>

    <main class="main">
      <div id="statusMsg" class="status-msg" aria-live="polite"></div>
      <div id="pokemonGrid" class="pokemon-grid"></div>
      <div id="loadMoreWrapper" class="load-more-wrapper">
        <button id="loadMoreBtn" class="load-more-btn">Carregar mais</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
